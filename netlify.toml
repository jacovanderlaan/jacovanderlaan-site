# Netlify configuration — static site, no build step (per ADR-046)
# Once the GitHub repo is git-connected in the Netlify dashboard,
# every push to main auto-deploys using these settings.

[build]
  publish = "."
  command = ""

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pretty URLs: allow /approach instead of /approach.html
[[redirects]]
  from = "/approach"
  to = "/approach.html"
  status = 200
[[redirects]]
  from = "/teams"
  to = "/teams.html"
  status = 200
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200
[[redirects]]
  from = "/work"
  to = "/work.html"
  status = 200
[[redirects]]
  from = "/writing"
  to = "/writing.html"
  status = 200
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
