<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="s" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#eab308"/></marker>
    <marker id="arb" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" font-size="32" font-weight="800" fill="#f8fafc">Diagrams &amp; visualization</text>
  <text x="600" y="90" text-anchor="middle" font-size="17" fill="#94a3b8">Metadata in, clear pictures out — generated, so they never drift</text>

  <!-- metadata source -->
  <rect x="70" y="220" width="210" height="120" rx="14" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="175" y="262" text-anchor="middle" font-size="18" font-weight="700" fill="#7dd3fc">Metadata</text>
  <text x="175" y="288" text-anchor="middle" font-size="13" fill="#cdeafe">models · lineage</text>
  <text x="175" y="308" text-anchor="middle" font-size="13" fill="#cdeafe">YAML · rules</text>

  <!-- generation engine -->
  <circle cx="430" cy="280" r="62" fill="#3a2f12" stroke="#eab308" stroke-width="2.6" filter="url(#s)"/>
  <text x="430" y="276" text-anchor="middle" font-size="15" font-weight="800" fill="#fde68a">generate</text>
  <text x="430" y="298" text-anchor="middle" font-size="12" fill="#f0e6c8">+ round-trip</text>
  <line x1="280" y1="280" x2="362" y2="280" stroke="#38bdf8" stroke-width="3" marker-end="url(#arb)"/>

  <!-- four diagram outputs -->
  <g>
    <rect x="600" y="120" width="240" height="80" rx="12" fill="#13324a" stroke="#38bdf8" stroke-width="2" filter="url(#s)"/>
    <text x="720" y="166" text-anchor="middle" font-size="17" font-weight="700" fill="#cdeafe">draw.io</text>
    <rect x="600" y="220" width="240" height="80" rx="12" fill="#13324a" stroke="#38bdf8" stroke-width="2" filter="url(#s)"/>
    <text x="720" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#cdeafe">yEd</text>
    <rect x="600" y="320" width="240" height="80" rx="12" fill="#13324a" stroke="#38bdf8" stroke-width="2" filter="url(#s)"/>
    <text x="720" y="366" text-anchor="middle" font-size="17" font-weight="700" fill="#cdeafe">Mermaid</text>
    <rect x="880" y="220" width="240" height="80" rx="12" fill="#13324a" stroke="#38bdf8" stroke-width="2" filter="url(#s)"/>
    <text x="1000" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#cdeafe">PlantUML</text>
  </g>
  <line x1="492" y1="255" x2="596" y2="170" stroke="#eab308" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="494" y1="280" x2="596" y2="262" stroke="#eab308" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="492" y1="305" x2="596" y2="358" stroke="#eab308" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="840" y1="262" x2="876" y2="262" stroke="#475569" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- round-trip arrow back -->
  <path d="M720 410 C 500 470, 360 430, 410 348" fill="none" stroke="#7dd3fc" stroke-width="2.4" stroke-dasharray="5 4" marker-end="url(#arb)"/>
  <text x="540" y="455" text-anchor="middle" font-size="13" fill="#7dd3fc">parse diagrams back into metadata</text>

  <text x="600" y="520" text-anchor="middle" font-size="16" fill="#e2e8f0"><tspan fill="#94a3b8">Making the complex </tspan><tspan fill="#fde68a" font-weight="700">clear</tspan><tspan fill="#94a3b8"> — the picture and the model stay in sync.</tspan></text>
</svg>
