<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a3a"/><stop offset="1" stop-color="#0b2230"/>
    </linearGradient>
    <linearGradient id="midCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f12"/><stop offset="1" stop-color="#2a2210"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#38bdf8" stroke-width="2"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="92" text-anchor="middle" font-size="56" font-weight="800" fill="#f8fafc">Metadata in the middle</text>
  <text x="800" y="138" text-anchor="middle" font-size="25" fill="#94a3b8">Parse the SQL into a model, validate and extend it, generate clean SQL — or dbt — back.</text>
  <rect x="660" y="158" width="280" height="4" rx="2" fill="#38bdf8"/>

  <!-- LEFT: existing SQL -->
  <rect x="70" y="360" width="300" height="200" rx="20" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="220" y="420" text-anchor="middle" font-size="28" font-weight="800" fill="#38bdf8">Existing SQL</text>
  <line x1="110" y1="442" x2="330" y2="442" stroke="#1e6f93" stroke-width="1.5"/>
  <text x="220" y="484" text-anchor="middle" font-size="17" fill="#cdeafe">joins, filters, CTEs —</text>
  <text x="220" y="510" text-anchor="middle" font-size="17" fill="#cdeafe">structure hidden inside</text>
  <text x="220" y="540" text-anchor="middle" font-size="15" fill="#7fb4d4" font-style="italic">where architecture hides</text>

  <!-- arrow 1: parse -->
  <line x1="378" y1="460" x2="558" y2="460" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="468" y="445" text-anchor="middle" font-size="18" fill="#7dd3fc" font-weight="700">parse</text>

  <!-- MIDDLE: metadata model (the centre) -->
  <rect x="560" y="320" width="380" height="280" rx="20" fill="url(#midCard)" stroke="#38bdf8" stroke-width="3.5" filter="url(#soft)"/>
  <text x="750" y="378" text-anchor="middle" font-size="30" font-weight="800" fill="#7dd3fc">Metadata model</text>
  <text x="750" y="406" text-anchor="middle" font-size="15" fill="#38bdf8" font-weight="700">◆ THE SOURCE OF TRUTH ◆</text>
  <line x1="600" y1="426" x2="900" y2="426" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="750" y="466" text-anchor="middle" font-size="17" fill="#e0f2fe">YAML — explicit, governed</text>
  <text x="750" y="498" text-anchor="middle" font-size="17" fill="#e0f2fe">validate · improve · extend</text>
  <text x="750" y="530" text-anchor="middle" font-size="17" fill="#e0f2fe">full lineage &amp; documentation</text>
  <text x="750" y="566" text-anchor="middle" font-size="15" fill="#7dd3fc" font-style="italic">humans stay in control</text>

  <!-- arrow 2: generate -->
  <line x1="942" y1="460" x2="1122" y2="460" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1032" y="445" text-anchor="middle" font-size="18" fill="#7dd3fc" font-weight="700">generate</text>

  <!-- RIGHT: outputs (multiple targets) -->
  <rect x="1124" y="332" width="300" height="86" rx="14" fill="url(#goldCard)" stroke="#eab308" stroke-width="2" filter="url(#soft)"/>
  <text x="1274" y="385" text-anchor="middle" font-size="24" font-weight="800" fill="#fde68a">Clean SQL</text>
  <rect x="1124" y="430" width="300" height="86" rx="14" fill="url(#goldCard)" stroke="#eab308" stroke-width="2" filter="url(#soft)"/>
  <text x="1274" y="483" text-anchor="middle" font-size="24" font-weight="800" fill="#fde68a">dbt project</text>
  <rect x="1124" y="528" width="300" height="86" rx="14" fill="url(#goldCard)" stroke="#eab308" stroke-width="2" filter="url(#soft)"/>
  <text x="1274" y="575" text-anchor="middle" font-size="22" font-weight="800" fill="#fde68a">tests · docs · lineage</text>

  <!-- round-trip arc back (parse ⇄ generate) -->
  <path d="M 750 600 Q 750 680 560 680 L 320 680 Q 220 680 220 565" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="470" y="704" text-anchor="middle" font-size="16" fill="#94a3b8" font-style="italic">round-trip — SQL ⇄ metadata, no drift</text>

  <!-- signature -->
  <rect x="240" y="806" width="1120" height="62" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="846" text-anchor="middle" font-size="23" fill="#e2e8f0">
    <tspan fill="#94a3b8">Parse → model → generate · the model is the truth, the tools are how it ships</tspan>
  </text>
</svg>
