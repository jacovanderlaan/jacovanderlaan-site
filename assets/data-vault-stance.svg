<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="keepCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <linearGradient id="dropCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1414"/><stop offset="1" stop-color="#1f0f0f"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f12"/><stop offset="1" stop-color="#2a2210"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="92" text-anchor="middle" font-size="54" font-weight="800" fill="#f8fafc">Data Vault: principles without the dogma</text>
  <text x="800" y="138" text-anchor="middle" font-size="24" fill="#94a3b8">Borrow what's valuable. Leave the orthodoxy. Build what the business can actually read.</text>
  <rect x="640" y="158" width="320" height="4" rx="2" fill="#38bdf8"/>

  <!-- KEEP column -->
  <rect x="90" y="220" width="660" height="500" rx="24" fill="url(#keepCard)" stroke="#38bdf8" stroke-width="3" filter="url(#soft)"/>
  <text x="420" y="284" text-anchor="middle" font-size="32" font-weight="800" fill="#7dd3fc">Keep the principles</text>
  <line x1="150" y1="312" x2="690" y2="312" stroke="#38bdf8" stroke-width="1.5"/>
  <g font-size="21" fill="#e0f2fe">
    <text x="150" y="368">✓  Historization &amp; full audit trail</text>
    <text x="150" y="420">✓  Traceability — where did this come from?</text>
    <text x="150" y="472">✓  Business keys at the centre</text>
    <text x="150" y="524">✓  Separating structure from history</text>
    <text x="150" y="576">✓  Insert-only thinking (Databricks-friendly)</text>
    <text x="150" y="628">✓  Bi-temporal where it earns its keep</text>
  </g>
  <text x="420" y="690" text-anchor="middle" font-size="17" fill="#7dd3fc" font-style="italic">the goals are sound</text>

  <!-- DROP column -->
  <rect x="850" y="220" width="660" height="500" rx="24" fill="url(#dropCard)" stroke="#7f1d1d" stroke-width="2.5" filter="url(#soft)"/>
  <text x="1180" y="284" text-anchor="middle" font-size="32" font-weight="800" fill="#fca5a5">Drop the dogma</text>
  <line x1="910" y1="312" x2="1450" y2="312" stroke="#7f1d1d" stroke-width="1.5"/>
  <g font-size="21" fill="#fecaca">
    <text x="910" y="368">✗  "One model for OLTP and OLAP"</text>
    <text x="910" y="420">✗  Hubs/links/sats as religion</text>
    <text x="910" y="472">✗  Full DV weight on every project</text>
    <text x="910" y="524">✗  Method first, business second</text>
    <text x="910" y="576">✗  Tooling lock-in to one framework</text>
    <text x="910" y="628">✗  Complexity the business can't read</text>
  </g>
  <text x="1180" y="690" text-anchor="middle" font-size="17" fill="#fca5a5" font-style="italic">not every problem needs it</text>

  <!-- result band -->
  <rect x="400" y="744" width="800" height="64" rx="16" fill="url(#goldCard)" stroke="#eab308" stroke-width="2.5" filter="url(#soft)"/>
  <text x="800" y="784" text-anchor="middle" font-size="22" font-weight="700" fill="#fde68a">→ Business-oriented 3NF + SCD2 — the goals of DV, readable by the business</text>

  <!-- signature -->
  <text x="800" y="858" text-anchor="middle" font-size="19" fill="#64748b">Certified Data Vault Modeler · Rabobank · de Volksbank — experience, with perspective</text>
</svg>
