<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="topCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="74" text-anchor="middle" font-size="48" font-weight="800" fill="#f8fafc">Site menu — structure</text>
  <text x="800" y="114" text-anchor="middle" font-size="22" fill="#94a3b8">5 top items + Contact. Three open as dropdowns; sub-pages live underneath.</text>
  <rect x="690" y="132" width="220" height="4" rx="2" fill="#38bdf8"/>

  <!-- top menu bar mock -->
  <rect x="120" y="172" width="1360" height="64" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="212" font-size="20" font-weight="700" fill="#e2e8f0">Jaco van der Laan</text>
  <g font-size="17" fill="#cbd5e1" font-weight="600">
    <text x="640" y="212">Approach ▾</text>
    <text x="800" y="212">Services ▾</text>
    <text x="950" y="212">Expertise ▾</text>
    <text x="1130" y="212">Articles</text>
    <text x="1240" y="212">About ▾</text>
  </g>
  <rect x="1340" y="186" width="120" height="36" rx="18" fill="#2563eb"/>
  <text x="1400" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Get in touch</text>

  <!-- column helper -->
  <!-- Approach -->
  <rect x="60" y="300" width="270" height="210" rx="16" fill="url(#topCard)" stroke="#38bdf8" stroke-width="2" filter="url(#soft)"/>
  <text x="195" y="342" text-anchor="middle" font-size="23" font-weight="800" fill="#7dd3fc">Approach ▾</text>
  <line x1="90" y1="360" x2="300" y2="360" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="16" fill="#cdeafe"><text x="100" y="398">› The approach</text>
    <text x="100" y="436">› Principles &amp; manifesto</text>
    <text x="100" y="474">› MDDE</text></g>

  <!-- Services -->
  <rect x="350" y="300" width="270" height="210" rx="16" fill="url(#topCard)" stroke="#38bdf8" stroke-width="2" filter="url(#soft)"/>
  <text x="485" y="342" text-anchor="middle" font-size="23" font-weight="800" fill="#7dd3fc">Services ▾</text>
  <line x1="380" y1="360" x2="590" y2="360" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="16" fill="#cdeafe"><text x="390" y="398">› Services</text>
    <text x="390" y="436">› Work &amp; case studies</text></g>

  <!-- Expertise (taller) -->
  <rect x="640" y="300" width="300" height="380" rx="16" fill="url(#topCard)" stroke="#38bdf8" stroke-width="3" filter="url(#soft)"/>
  <text x="790" y="342" text-anchor="middle" font-size="23" font-weight="800" fill="#7dd3fc">Expertise ▾</text>
  <line x1="670" y1="360" x2="910" y2="360" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="16" fill="#cdeafe">
    <text x="680" y="398">› Overview</text>
    <text x="680" y="436">› SQL parsing &amp; migration</text>
    <text x="680" y="474">› Data Vault</text>
    <text x="680" y="512">› Data modeling</text>
    <text x="680" y="550">› Diagram generation</text>
    <text x="680" y="588">› Modeling tools</text>
    <text x="680" y="626">› Engineering &amp; architecture</text>
  </g>

  <!-- Articles (no dropdown) -->
  <rect x="960" y="300" width="270" height="210" rx="16" fill="#0b1f2b" stroke="#334155" stroke-width="2" filter="url(#soft)"/>
  <text x="1095" y="342" text-anchor="middle" font-size="23" font-weight="800" fill="#94a3b8">Articles</text>
  <line x1="990" y1="360" x2="1200" y2="360" stroke="#334155" stroke-width="1.3"/>
  <text x="1095" y="406" text-anchor="middle" font-size="15" fill="#7fb4d4" font-style="italic">the blog —</text>
  <text x="1095" y="430" text-anchor="middle" font-size="15" fill="#7fb4d4" font-style="italic">230+ articles</text>
  <text x="1095" y="468" text-anchor="middle" font-size="14" fill="#64748b">(single item,</text>
  <text x="1095" y="490" text-anchor="middle" font-size="14" fill="#64748b">no dropdown)</text>

  <!-- About -->
  <rect x="1250" y="300" width="290" height="210" rx="16" fill="url(#topCard)" stroke="#38bdf8" stroke-width="2" filter="url(#soft)"/>
  <text x="1395" y="342" text-anchor="middle" font-size="23" font-weight="800" fill="#7dd3fc">About ▾</text>
  <line x1="1280" y1="360" x2="1510" y2="360" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="16" fill="#cdeafe"><text x="1290" y="398">› About</text>
    <text x="1290" y="436">› References</text>
    <text x="1290" y="474">› Ideas</text></g>

  <!-- notes -->
  <rect x="240" y="730" width="1120" height="120" rx="16" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="270" y="768" font-size="17" fill="#e2e8f0" font-weight="700">Notes for WordPress</text>
  <g font-size="15.5" fill="#cbd5e1">
    <text x="270" y="800">• Desktop: hover to open a dropdown. Mobile/tablet: hamburger → groups expand inline.</text>
    <text x="270" y="826">• Search = WordPress-native (its own icon, not in this map). · Contact = the “Get in touch” button.</text>
  </g>
</svg>
