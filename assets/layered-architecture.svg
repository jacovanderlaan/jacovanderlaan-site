<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="src" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#13324a"/><stop offset="1" stop-color="#0d2638"/></linearGradient>
    <linearGradient id="int" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0e2a3a"/><stop offset="1" stop-color="#0b2230"/></linearGradient>
    <linearGradient id="del" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a2f12"/><stop offset="1" stop-color="#2a2210"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" font-size="34" font-weight="800" fill="#f8fafc">Layered data architecture</text>
  <text x="600" y="96" text-anchor="middle" font-size="18" fill="#94a3b8">Source → Integration → Delivery — raw becomes clean becomes usable</text>

  <!-- Source -->
  <rect x="70" y="150" width="320" height="360" rx="18" fill="url(#src)" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="230" y="196" text-anchor="middle" font-size="24" font-weight="800" fill="#7dd3fc">Source</text>
  <text x="230" y="224" text-anchor="middle" font-size="15" fill="#9fcbe4" font-style="italic">raw, as it arrives</text>
  <line x1="110" y1="244" x2="350" y2="244" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="15.5" fill="#cdeafe"><text x="110" y="288">• Historized source models</text><text x="110" y="324">• No business logic yet</text><text x="110" y="360">• Full history kept</text><text x="110" y="396">• PSA / HSA staging</text></g>
  <text x="230" y="470" text-anchor="middle" font-size="14" fill="#7dd3fc">bronze</text>

  <!-- Integration -->
  <rect x="440" y="150" width="320" height="360" rx="18" fill="url(#int)" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="196" text-anchor="middle" font-size="24" font-weight="800" fill="#7dd3fc">Integration</text>
  <text x="600" y="224" text-anchor="middle" font-size="15" fill="#9fcbe4" font-style="italic">clean, conformed, ruled</text>
  <line x1="480" y1="244" x2="720" y2="244" stroke="#1e6f93" stroke-width="1.3"/>
  <g font-size="15.5" fill="#cdeafe"><text x="480" y="288">• Business-shaped 3NF</text><text x="480" y="324">• Rules + classification</text><text x="480" y="360">• Bi-temporal SCD2</text><text x="480" y="396">• Validated, governed</text></g>
  <text x="600" y="470" text-anchor="middle" font-size="14" fill="#7dd3fc">silver</text>

  <!-- Delivery -->
  <rect x="810" y="150" width="320" height="360" rx="18" fill="url(#del)" stroke="#eab308" stroke-width="2.4" filter="url(#s)"/>
  <text x="970" y="196" text-anchor="middle" font-size="24" font-weight="800" fill="#fde68a">Delivery</text>
  <text x="970" y="224" text-anchor="middle" font-size="15" fill="#d6c79a" font-style="italic">usable, consumable</text>
  <line x1="850" y1="244" x2="1090" y2="244" stroke="#a98417" stroke-width="1.3"/>
  <g font-size="15.5" fill="#f0e6c8"><text x="850" y="288">• Star schemas / marts</text><text x="850" y="324">• Unified star schema</text><text x="850" y="360">• Semantic layer</text><text x="850" y="396">• Data products</text></g>
  <text x="970" y="470" text-anchor="middle" font-size="14" fill="#fde68a">gold</text>

  <!-- arrows -->
  <line x1="392" y1="330" x2="436" y2="330" stroke="#38bdf8" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="762" y1="330" x2="806" y2="330" stroke="#38bdf8" stroke-width="3" marker-end="url(#ar)"/>

  <text x="600" y="560" text-anchor="middle" font-size="17" fill="#e2e8f0"><tspan fill="#94a3b8">Metadata-driven across every layer — </tspan><tspan fill="#7dd3fc" font-weight="700">structure is explicit, not implied.</tspan></text>
  <text x="1166" y="600" text-anchor="end" font-size="13" fill="#64748b">Jaco van der Laan</text>
</svg>
