<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="ax" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" font-size="34" font-weight="800" fill="#f8fafc">Bi-temporal modeling</text>
  <text x="600" y="94" text-anchor="middle" font-size="18" fill="#94a3b8">Two timelines: when it was true in the world, and when we recorded it</text>

  <!-- axes -->
  <line x1="150" y1="520" x2="1080" y2="520" stroke="#94a3b8" stroke-width="2" marker-end="url(#ax)"/>
  <text x="1080" y="556" text-anchor="end" font-size="16" fill="#cbd5e1" font-weight="600">Valid time (when true in reality)</text>
  <line x1="150" y1="520" x2="150" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#ax)"/>
  <text x="135" y="135" text-anchor="end" font-size="16" fill="#cbd5e1" font-weight="600" transform="rotate(-90 135 300)" x="135" y="300">Transaction time (when recorded)</text>

  <!-- grid hint -->
  <g stroke="#1e293b" stroke-width="1"><line x1="370" y1="160" x2="370" y2="520"/><line x1="610" y1="160" x2="610" y2="520"/><line x1="850" y1="160" x2="850" y2="520"/><line x1="150" y1="400" x2="1080" y2="400"/><line x1="150" y1="280" x2="1080" y2="280"/></g>

  <!-- versioned cells -->
  <rect x="160" y="410" width="210" height="100" rx="10" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="265" y="448" text-anchor="middle" font-size="15" fill="#cdeafe" font-weight="700">v1 — recorded</text>
  <text x="265" y="472" text-anchor="middle" font-size="13" fill="#9fcbe4">"as we knew it then"</text>

  <rect x="380" y="290" width="220" height="100" rx="10" fill="#13324a" stroke="#38bdf8" stroke-width="2.5" filter="url(#s)"/>
  <text x="490" y="328" text-anchor="middle" font-size="15" fill="#7dd3fc" font-weight="700">v2 — correction</text>
  <text x="490" y="352" text-anchor="middle" font-size="13" fill="#cdeafe">same fact, fixed later</text>

  <rect x="620" y="410" width="220" height="100" rx="10" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="730" y="448" text-anchor="middle" font-size="15" fill="#cdeafe" font-weight="700">v3 — new period</text>
  <text x="730" y="472" text-anchor="middle" font-size="13" fill="#9fcbe4">reality changed</text>

  <!-- callout -->
  <rect x="300" y="150" width="600" height="64" rx="12" fill="#3a2f12" stroke="#eab308" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="190" text-anchor="middle" font-size="17" fill="#fde68a" font-weight="700">You can ask: "What did we believe on any past date?" — and prove it.</text>

  <text x="600" y="600" text-anchor="middle" font-size="16" fill="#e2e8f0"><tspan fill="#94a3b8">True history, deterministic and auditable. </tspan><tspan fill="#7dd3fc" font-weight="700">SCD2 is not enough.</tspan></text>
  <text x="1166" y="628" text-anchor="end" font-size="13" fill="#64748b">Jaco van der Laan</text>
</svg>
