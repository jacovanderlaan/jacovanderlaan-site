<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#f8fafc">CTE-by-CTE regression testing</text>
  <text x="600" y="92" text-anchor="middle" font-size="18" fill="#94a3b8">Don't ask <tspan font-style="italic">that</tspan> the output differs — find <tspan font-style="italic">which</tspan> step diverged</text>

  <!-- Legacy column -->
  <text x="320" y="150" text-anchor="middle" font-size="20" font-weight="800" fill="#cbd5e1">Legacy SQL</text>
  <text x="880" y="150" text-anchor="middle" font-size="20" font-weight="800" fill="#cbd5e1">New SQL</text>

  <!-- rows -->
  <g font-size="16">
    <!-- base -->
    <rect x="170" y="175" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2"/><text x="320" y="212" text-anchor="middle" fill="#cdeafe">base</text>
    <rect x="730" y="175" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2"/><text x="880" y="212" text-anchor="middle" fill="#cdeafe">base</text>
    <rect x="488" y="188" width="224" height="34" rx="17" fill="#0b1f17" stroke="#22c55e" stroke-width="1.6"/><text x="600" y="211" text-anchor="middle" fill="#4ade80" font-weight="700" font-size="14">0 diff ✓</text>

    <!-- cleaned -->
    <rect x="170" y="255" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2"/><text x="320" y="292" text-anchor="middle" fill="#cdeafe">cleaned</text>
    <rect x="730" y="255" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2"/><text x="880" y="292" text-anchor="middle" fill="#cdeafe">cleaned</text>
    <rect x="488" y="268" width="224" height="34" rx="17" fill="#0b1f17" stroke="#22c55e" stroke-width="1.6"/><text x="600" y="291" text-anchor="middle" fill="#4ade80" font-weight="700" font-size="14">0 diff ✓</text>

    <!-- enriched - ROOT CAUSE -->
    <rect x="170" y="335" width="300" height="60" rx="9" fill="#3b1d2e" stroke="#fb7185" stroke-width="2.5"/><text x="320" y="372" text-anchor="middle" fill="#fbcfe0" font-weight="700">enriched</text>
    <rect x="730" y="335" width="300" height="60" rx="9" fill="#3b1d2e" stroke="#fb7185" stroke-width="2.5"/><text x="880" y="372" text-anchor="middle" fill="#fbcfe0" font-weight="700">enriched</text>
    <rect x="478" y="346" width="244" height="38" rx="19" fill="#2a1622" stroke="#fb7185" stroke-width="2"/><text x="600" y="371" text-anchor="middle" fill="#fb7185" font-weight="800" font-size="14">15 diff ◄ root cause</text>

    <!-- final -->
    <rect x="170" y="415" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#475569" stroke-width="1.5"/><text x="320" y="452" text-anchor="middle" fill="#94a3b8">final</text>
    <rect x="730" y="415" width="300" height="60" rx="9" fill="#0e2a3a" stroke="#475569" stroke-width="1.5"/><text x="880" y="452" text-anchor="middle" fill="#94a3b8">final</text>
    <text x="600" y="452" text-anchor="middle" fill="#64748b" font-size="13">(only here, the old way)</text>
  </g>

  <text x="600" y="540" text-anchor="middle" font-size="17" fill="#e2e8f0"><tspan fill="#94a3b8">Comparing the final output finds the symptom. Comparing step by step finds the </tspan><tspan fill="#fb7185" font-weight="700">cause</tspan><tspan fill="#94a3b8">.</tspan></text>
  <text x="600" y="572" text-anchor="middle" font-size="16" fill="#7dd3fc" font-weight="700">Migration debugging, ~10× faster.</text>
  <text x="1166" y="624" text-anchor="end" font-size="13" fill="#64748b">Jaco van der Laan</text>
</svg>
