<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="genCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a3a"/>
      <stop offset="1" stop-color="#0b2230"/>
    </linearGradient>
    <linearGradient id="valCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/>
      <stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#eab308"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="92" text-anchor="middle" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="1">The validation loop</text>
  <text x="800" y="138" text-anchor="middle" font-size="25" fill="#94a3b8">AI that checks its own work — and improves the checks</text>
  <rect x="600" y="158" width="400" height="4" rx="2" fill="#38bdf8"/>

  <!-- Box: Rules -->
  <rect x="120" y="320" width="280" height="130" rx="18" fill="url(#genCard)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="260" y="378" text-anchor="middle" font-size="28" font-weight="800" fill="#38bdf8">Rules</text>
  <text x="260" y="412" text-anchor="middle" font-size="18" fill="#cdeafe">generation logic</text>

  <!-- Box: AI generates -->
  <rect x="560" y="320" width="300" height="130" rx="18" fill="url(#genCard)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="710" y="372" text-anchor="middle" font-size="26" font-weight="800" fill="#38bdf8">AI generates</text>
  <text x="710" y="406" text-anchor="middle" font-size="18" fill="#cdeafe">output / derived data</text>

  <!-- Box: Validation -->
  <rect x="1020" y="306" width="340" height="158" rx="18" fill="url(#valCard)" stroke="#38bdf8" stroke-width="3.5" filter="url(#soft)"/>
  <text x="1190" y="356" text-anchor="middle" font-size="25" font-weight="800" fill="#7dd3fc">Validation /</text>
  <text x="1190" y="386" text-anchor="middle" font-size="25" font-weight="800" fill="#7dd3fc">plausibility rules</text>
  <text x="1190" y="420" text-anchor="middle" font-size="17" fill="#e0f2fe">does this make sense</text>
  <text x="1190" y="442" text-anchor="middle" font-size="17" fill="#e0f2fe">given what I know?</text>

  <!-- Arrows across the top row -->
  <line x1="400" y1="385" x2="555" y2="385" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="860" y1="385" x2="1015" y2="385" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision: flag / confirm -->
  <rect x="1020" y="540" width="340" height="96" rx="16" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="1190" y="578" text-anchor="middle" font-size="20" fill="#e2e8f0" font-weight="700">On mismatch:</text>
  <text x="1190" y="608" text-anchor="middle" font-size="19" fill="#fbbf24">flag &amp; tell me — never guess</text>

  <!-- arrow validation -> decision -->
  <line x1="1190" y1="464" x2="1190" y2="535" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- LOOP 1: review -> improve generation rules (back to Rules) -->
  <path d="M1020 588 C 600 700, 360 640, 260 458" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="2 0" marker-end="url(#arrow)"/>
  <rect x="540" y="648" width="360" height="44" rx="10" fill="#0e2a3a" stroke="#1e6f93" stroke-width="1.5"/>
  <text x="720" y="677" text-anchor="middle" font-size="18" fill="#7dd3fc" font-weight="700">Loop 1 · review → better generation rules</text>

  <!-- LOOP 2: improve the validation rules themselves -->
  <path d="M1300 540 C 1420 460, 1420 410, 1362 380" fill="none" stroke="#eab308" stroke-width="3" marker-end="url(#arrowGold)"/>
  <rect x="1140" y="690" width="300" height="44" rx="10" fill="#2a2210" stroke="#eab308" stroke-width="1.5"/>
  <text x="1290" y="719" text-anchor="middle" font-size="17" fill="#fde68a" font-weight="700">Loop 2 · improve the checks too</text>

  <!-- Bottom signature line -->
  <rect x="200" y="792" width="1200" height="62" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="832" text-anchor="middle" font-size="23" fill="#e2e8f0">
    <tspan fill="#94a3b8">Data quality applied to a life. The </tspan><tspan fill="#7dd3fc" font-weight="800">missing word</tspan><tspan fill="#94a3b8"> in "data + AI" is </tspan><tspan fill="#7dd3fc" font-weight="800">rules</tspan><tspan fill="#94a3b8">.</tspan>
  </text>

  <!-- Attribution -->
  <text x="1466" y="180" text-anchor="end" font-size="16" fill="#64748b">Jaco van der Laan · MDDE × AI</text>
</svg>
