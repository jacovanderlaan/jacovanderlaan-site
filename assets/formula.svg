<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a3a"/>
      <stop offset="1" stop-color="#0b2230"/>
    </linearGradient>
    <linearGradient id="rulesCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/>
      <stop offset="1" stop-color="#0d2638"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f12"/>
      <stop offset="1" stop-color="#2a2210"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="92" text-anchor="middle" font-size="58" font-weight="800" fill="#f8fafc" letter-spacing="1">The formula</text>
  <text x="800" y="138" text-anchor="middle" font-size="25" fill="#94a3b8">Everyone says data + AI. The missing word is rules.</text>
  <rect x="660" y="158" width="280" height="4" rx="2" fill="#38bdf8"/>

  <!-- Four ingredient cards -->
  <!-- Structure -->
  <rect x="70" y="300" width="300" height="240" rx="20" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="220" y="360" text-anchor="middle" font-size="30" font-weight="800" fill="#38bdf8">Structure</text>
  <line x1="110" y1="384" x2="330" y2="384" stroke="#1e6f93" stroke-width="1.5"/>
  <text x="220" y="430" text-anchor="middle" font-size="19" fill="#cdeafe">An ordered system to</text>
  <text x="220" y="458" text-anchor="middle" font-size="19" fill="#cdeafe">work in — vault,</text>
  <text x="220" y="486" text-anchor="middle" font-size="19" fill="#cdeafe">DuckDB, schema</text>
  <text x="220" y="520" text-anchor="middle" font-size="16" fill="#7fb4d4" font-style="italic">or data is noise</text>

  <!-- Data -->
  <rect x="400" y="300" width="300" height="240" rx="20" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="550" y="360" text-anchor="middle" font-size="30" font-weight="800" fill="#38bdf8">Data</text>
  <line x1="440" y1="384" x2="660" y2="384" stroke="#1e6f93" stroke-width="1.5"/>
  <text x="550" y="430" text-anchor="middle" font-size="19" fill="#cdeafe">Your own, deliberately</text>
  <text x="550" y="458" text-anchor="middle" font-size="19" fill="#cdeafe">built sources</text>
  <text x="550" y="520" text-anchor="middle" font-size="16" fill="#7fb4d4" font-style="italic">years of it = a head start</text>

  <!-- AI -->
  <rect x="730" y="300" width="300" height="240" rx="20" fill="url(#card)" stroke="#1e6f93" stroke-width="2" filter="url(#soft)"/>
  <text x="880" y="360" text-anchor="middle" font-size="30" font-weight="800" fill="#38bdf8">AI</text>
  <line x1="770" y1="384" x2="990" y2="384" stroke="#1e6f93" stroke-width="1.5"/>
  <text x="880" y="430" text-anchor="middle" font-size="19" fill="#cdeafe">The reasoning layer</text>
  <text x="880" y="458" text-anchor="middle" font-size="19" fill="#cdeafe">(Claude)</text>
  <text x="880" y="520" text-anchor="middle" font-size="16" fill="#7fb4d4" font-style="italic">harvests at scale</text>

  <!-- Rules (highlighted = the wedge) -->
  <rect x="1060" y="284" width="300" height="272" rx="20" fill="url(#rulesCard)" stroke="#38bdf8" stroke-width="3.5" filter="url(#soft)"/>
  <text x="1210" y="334" text-anchor="middle" font-size="30" font-weight="800" fill="#7dd3fc">Rules</text>
  <text x="1210" y="362" text-anchor="middle" font-size="15" fill="#38bdf8" font-weight="700">◆ THE WEDGE ◆</text>
  <line x1="1100" y1="382" x2="1320" y2="382" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="1210" y="424" text-anchor="middle" font-size="19" fill="#e0f2fe">Classification, filters,</text>
  <text x="1210" y="452" text-anchor="middle" font-size="19" fill="#e0f2fe">decision logic</text>
  <text x="1210" y="492" text-anchor="middle" font-size="16" fill="#7dd3fc" font-style="italic">makes it reliable,</text>
  <text x="1210" y="516" text-anchor="middle" font-size="16" fill="#7dd3fc" font-style="italic">repeatable, explainable</text>

  <!-- Plus signs -->
  <text x="385" y="430" text-anchor="middle" font-size="40" fill="#64748b" font-weight="700">+</text>
  <text x="715" y="430" text-anchor="middle" font-size="40" fill="#64748b" font-weight="700">+</text>
  <text x="1045" y="430" text-anchor="middle" font-size="40" fill="#64748b" font-weight="700">+</text>

  <!-- Arrow down to result -->
  <text x="800" y="624" text-anchor="middle" font-size="40" fill="#38bdf8" font-weight="800">↓</text>

  <!-- Result: Intelligence -->
  <rect x="500" y="648" width="600" height="120" rx="20" fill="url(#goldCard)" stroke="#eab308" stroke-width="2.5" filter="url(#soft)"/>
  <text x="800" y="700" text-anchor="middle" font-size="38" font-weight="800" fill="#fde68a">Intelligence</text>
  <text x="800" y="738" text-anchor="middle" font-size="19" fill="#d6c79a">Insight you act on — the result that has value</text>

  <!-- Bottom signature line -->
  <rect x="240" y="806" width="1120" height="62" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="800" y="846" text-anchor="middle" font-size="24" fill="#e2e8f0">
    <tspan fill="#94a3b8">Structure + Data + AI + </tspan><tspan fill="#7dd3fc" font-weight="800">Rules</tspan><tspan fill="#94a3b8"> → </tspan><tspan fill="#fde68a" font-weight="800">Intelligence</tspan>
  </text>

  <!-- Attribution -->
  <text x="1466" y="180" text-anchor="end" font-size="16" fill="#64748b">Jaco van der Laan · MDDE × AI</text>
</svg>
