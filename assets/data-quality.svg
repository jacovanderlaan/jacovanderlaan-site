<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="540" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" font-size="32" font-weight="800" fill="#f8fafc">Data quality &amp; governance</text>
  <text x="600" y="90" text-anchor="middle" font-size="17" fill="#94a3b8">Validation built into the pipeline — trust, not hope</text>

  <!-- pipeline with a quality gate -->
  <rect x="80" y="220" width="200" height="90" rx="12" fill="#0e2a3a" stroke="#1e6f93" stroke-width="2" filter="url(#s)"/>
  <text x="180" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#cdeafe">Source</text>
  <text x="180" y="282" text-anchor="middle" font-size="13" fill="#9fcbe4">raw data in</text>

  <rect x="500" y="200" width="220" height="130" rx="14" fill="#13324a" stroke="#38bdf8" stroke-width="3" filter="url(#s)"/>
  <text x="610" y="244" text-anchor="middle" font-size="19" font-weight="800" fill="#7dd3fc">Quality gate</text>
  <text x="610" y="272" text-anchor="middle" font-size="13.5" fill="#e0f2fe">rules · validation</text>
  <text x="610" y="294" text-anchor="middle" font-size="13.5" fill="#e0f2fe">plausibility checks</text>
  <text x="610" y="316" text-anchor="middle" font-size="12.5" fill="#9fcbe4" font-style="italic">mismatch → flag, don't pass</text>

  <rect x="940" y="220" width="200" height="90" rx="12" fill="#3a2f12" stroke="#eab308" stroke-width="2.4" filter="url(#s)"/>
  <text x="1040" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#fde68a">Trusted data</text>
  <text x="1040" y="282" text-anchor="middle" font-size="13" fill="#f0e6c8">out</text>

  <line x1="280" y1="265" x2="496" y2="265" stroke="#38bdf8" stroke-width="3" marker-end="url(#ar)"/>
  <line x1="720" y1="265" x2="936" y2="265" stroke="#38bdf8" stroke-width="3" marker-end="url(#ar)"/>

  <!-- lineage thread underneath -->
  <line x1="180" y1="360" x2="1040" y2="360" stroke="#475569" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="180" cy="360" r="5" fill="#7dd3fc"/><circle cx="610" cy="360" r="5" fill="#7dd3fc"/><circle cx="1040" cy="360" r="5" fill="#7dd3fc"/>
  <text x="610" y="392" text-anchor="middle" font-size="14" fill="#94a3b8">lineage + historization, built in across every step</text>

  <text x="600" y="470" text-anchor="middle" font-size="17" fill="#e2e8f0"><tspan fill="#94a3b8">Quality as a service the pipeline </tspan><tspan fill="#7dd3fc" font-weight="700">consumes</tspan><tspan fill="#94a3b8"> — not a gate at the end.</tspan></text>
  <text x="1166" y="520" text-anchor="end" font-size="13" fill="#64748b">Jaco van der Laan</text>
</svg>
